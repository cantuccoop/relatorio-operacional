  const now = new Date();
  if (now.getHours() < 5) now.setDate(now.getDate() - 1);

};

  if (!d) return '-';
  const [y,m,day] = d.split('-');

// ── Validation per step ───────────────────────────────────────────────────────
const isStepValid = (step, f) => {
  switch (step) {
    case 1: return f.date && f.shift && f.responsible && f.movimento;
    case 2:
      if (f.tma === '' || f.pctAcima20 === '') return false;
      if (f.temAtraso === null || f.temReclamacaoDemora === null || f.temErroQualidade === null) return false;
      if (f.temErroQualidade && (!f.erroQualidadeDesc || !f.erroFeito || f.erroCompensacao === null)) return false;
      return true;
    case 3:
      if ([f.temReclamacaoAtendimento, f.temReclamacaoRuptura, f.temDificuldadeExplicacao,
           f.temElogios, f.visitaMesa].some(v => v === null)) return false;
      if (f.temReclamacaoAtendimento && (!f.reclamacaoAtendimentoDesc || !f.solucaoAtendimento)) return false;
      if (f.temReclamacaoRuptura && (!f.rupturaSalaoDesc || !f.solucaoRuptura)) return false;
      if (f.temDificuldadeExplicacao && !f.dificuldadeDesc) return false;
      if (f.visitaMesa === false && !f.semVisitaMotivo) return false;
      return true;
    case 4:
      if ([f.deliveryAtraso, f.deliveryErroDespacho, f.deliveryReclamacaoQualidade,
           f.deliveryProdutoFalta, f.deliveryCortesia].some(v => v === null)) return false;
      return true;
    case 5:
      if ([f.checklistsOk, f.faltaAtraso, f.rupturaOp,
           f.problemaSistema, f.equipamentoQuebrado].some(v => v === null)) return false;
      if (f.equipamentoQuebrado && (!f.equipamentoDesc || !f.equipamentoAcao || !f.equipamentoPrazo)) return false;
      return true;
    case 6:
      return f.principalBO && f.principalAcerto && f.atencaoProximo && f.notaTurno !== '';
    default: return true;
  }
};

const ReportCard = ({ r, onClick }) => {
  const unit = UNITS.find(u => u.id === r.unit);
  const alerts = [
    r.temErroQualidade, r.temReclamacaoAtendimento, r.deliveryAtraso,
    r.equipamentoQuebrado, r.problemaSistema, r.rupturaOp
  ].filter(Boolean).length;
  return (
    <div onClick={onClick} className="bg-white rounded-xl border border-slate-200 p-4 cursor-pointer hover:border-orange-300 transition-all shadow-sm">
      <div className="flex justify-between items-start">
        <div>
          <span className={`text-xs font-bold text-white px-2 py-0.5 rounded-full ${unit?.color || 'bg-slate-500'}`}>
            {unit?.label || r.unit}
          </span>
          <div className="mt-1 text-sm font-semibold text-slate-700">{fmtDate(r.date)} · {r.shift}</div>
          <div className="text-xs text-slate-500">{r.responsible}</div>
        </div>
        <div className="text-right">
          <div className="text-2xl font-bold text-orange-500">{r.notaTurno}</div>
          <div className="text-xs text-slate-400">/10</div>
          {alerts > 0 && (
            <div className="mt-1 text-xs bg-red-50 text-red-600 px-2 py-0.5 rounded-full">
              {alerts} alerta{alerts > 1 ? 's' : ''}
            </div>
          )}
        </div>
      </div>
      <div className="mt-2 flex gap-3 text-xs text-slate-500">
        <span>⏱ TMA: {r.tma} min</span>
        <span>📦 {r.movimento}</span>
      </div>
    </div>
  );
};

// ── Report Modal ──────────────────────────────────────────────────────────────
const ReportModal = ({ r, onClose }) => {
  const unit = UNITS.find(u => u.id === r.unit);
  const yn = (v) => v === true ? '✅ Sim' : v === false ? '❌ Não' : '—';
  const Row = ({ label, value }) => value ? (
    <div className="flex gap-2 text-sm py-1 border-b border-slate-100">
      <span className="text-slate-500 w-44 shrink-0">{label}</span>
      <span className="text-slate-800">{value}</span>
    </div>
  ) : null;

  return (
    <div className="fixed inset-0 z-50 bg-black/40 flex items-end" onClick={onClose}>
      <div className="bg-white w-full max-h-[90vh] overflow-y-auto rounded-t-2xl p-5"
        onClick={e => e.stopPropagation()}>
        <div className="flex justify-between items-center mb-4">
          <div>
            <span className={`text-xs font-bold text-white px-2 py-0.5 rounded-full ${unit?.color || 'bg-slate-500'}`}>
              {unit?.label}
            </span>
            <div className="text-base font-bold mt-1">{fmtDate(r.date)} · {r.shift} · {r.responsible}</div>
          </div>
          <button onClick={onClose} className="text-slate-400 text-xl">✕</button>
        </div>

        <p className="text-xs font-bold text-orange-500 mb-2 uppercase tracking-wide">Identificação</p>
        <Row label="Movimento" value={r.movimento} />
        <Row label="Nota do turno" value={`${r.notaTurno}/10`} />

        <p className="text-xs font-bold text-orange-500 mt-4 mb-2 uppercase tracking-wide">TMA e Cozinha</p>
        <Row label="TMA" value={`${r.tma} min`} />
        <Row label="% acima 20 min" value={`${r.pctAcima20}%`} />
        <Row label="Atraso relevante" value={yn(r.temAtraso)} />
        <Row label="Reclamação demora" value={yn(r.temReclamacaoDemora)} />
        <Row label="Erro de qualidade" value={yn(r.temErroQualidade)} />
        {r.temErroQualidade && <>
          <Row label="  Erro" value={r.erroQualidadeDesc} />
          <Row label="  Mesa/Pedido" value={r.erroMesa} />
          <Row label="  Ação" value={r.erroFeito} />
          <Row label="  Compensação" value={yn(r.erroCompensacao)} />
        </>}

        <p className="text-xs font-bold text-orange-500 mt-4 mb-2 uppercase tracking-wide">Salão e Experiência</p>
        <Row label="Reclamação atendimento" value={yn(r.temReclamacaoAtendimento)} />
        {r.temReclamacaoAtendimento && <>
          <Row label="  Descrição" value={r.reclamacaoAtendimentoDesc} />
          <Row label="  Solução" value={r.solucaoAtendimento} />
        </>}
        <Row label="Reclamação ruptura" value={yn(r.temReclamacaoRuptura)} />
        <Row label="Dificuldade explicação" value={yn(r.temDificuldadeExplicacao)} />
        <Row label="Elogios" value={yn(r.temElogios)} />
        {r.temElogios && <Row label="  Detalhe" value={r.elogiosDesc} />}
        <Row label="Visita de mesa" value={yn(r.visitaMesa)} />
        {r.visitaMesa === false && <Row label="  Motivo" value={r.semVisitaMotivo} />}

        <p className="text-xs font-bold text-orange-500 mt-4 mb-2 uppercase tracking-wide">Delivery / iFood</p>
        <Row label="Atraso" value={yn(r.deliveryAtraso)} />
        <Row label="Erro de despacho" value={yn(r.deliveryErroDespacho)} />
        <Row label="Reclamação qualidade" value={yn(r.deliveryReclamacaoQualidade)} />
        <Row label="Produto em falta" value={yn(r.deliveryProdutoFalta)} />
        {r.deliveryProdutoFalta && <Row label="  Itens" value={r.deliveryFaltaDesc} />}
        <Row label="Cortesia enviada" value={yn(r.deliveryCortesia)} />
        {r.deliveryCortesia && <Row label="  Detalhe" value={r.deliveryCortesiaDesc} />}

        <p className="text-xs font-bold text-orange-500 mt-4 mb-2 uppercase tracking-wide">Operação</p>
        <Row label="Checklists ok" value={yn(r.checklistsOk)} />
        <Row label="Falta/atraso equipe" value={yn(r.faltaAtraso)} />
        {r.faltaAtraso && <Row label="  Detalhe" value={r.faltaAtrasoDesc} />}
        <Row label="Ruptura produto" value={yn(r.rupturaOp)} />
        {r.rupturaOp && <Row label="  Itens" value={r.rupturaOpDesc} />}
        <Row label="Problema sistema" value={yn(r.problemaSistema)} />
        {r.problemaSistema && <Row label="  Detalhe" value={r.sistemaDesc} />}
        <Row label="Equipamento quebrado" value={yn(r.equipamentoQuebrado)} />
        {r.equipamentoQuebrado && <>
          <Row label="  Equipamento" value={r.equipamentoDesc} />
          <Row label="  Ação" value={r.equipamentoAcao} />
          <Row label="  Prazo" value={fmtDate(r.equipamentoPrazo)} />
        </>}

        <p className="text-xs font-bold text-orange-500 mt-4 mb-2 uppercase tracking-wide">Gestão do Turno</p>
        <Row label="Principal BO" value={r.principalBO} />
        <Row label="Principal acerto" value={r.principalAcerto} />
        <Row label="Atenção próx. turno" value={r.atencaoProximo} />

        <div className="h-8" />
      </div>
    </div>
  );
};

// ── Dashboard ─────────────────────────────────────────────────────────────────
const Dashboard = ({ reports }) => {
  const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = getRC();
  const [unitFilter, setUnitFilter] = React.useState('all');

  const filtered = unitFilter === 'all'
    ? reports
    : reports.filter(r => r.unit === unitFilter);

  const avgNota = filtered.length
    ? (filtered.reduce((s, r) => s + Number(r.notaTurno || 0), 0) / filtered.length).toFixed(1)
    : '—';

  const countAlert = (key) => filtered.filter(r => r[key] === true).length;

  const byUnit = UNITS.filter(u => !u.external).map(u => ({
    name: u.label,
    count: reports.filter(r => r.unit === u.id).length,
    avgNota: (() => {
      const rs = reports.filter(r => r.unit === u.id);
      return rs.length ? +(rs.reduce((s,r) => s+Number(r.notaTurno||0),0)/rs.length).toFixed(1) : 0;
    })(),
  }));

  const COLORS = ['#f97316','#3b82f6','#22c55e','#a855f7','#f43f5e'];

  return (
    <div className="px-4 pb-24 pt-4">
      <h2 className="text-lg font-bold text-slate-800 mb-4">Dashboard</h2>

      {/* Unit filter */}
      <div className="flex gap-2 overflow-x-auto pb-2 mb-4">
        <button onClick={() => setUnitFilter('all')}
          className={`shrink-0 px-3 py-1 rounded-full text-xs font-medium border transition-all
            ${unitFilter === 'all' ? 'bg-orange-500 text-white border-orange-500' : 'bg-white border-slate-200 text-slate-600'}`}>
          Todas
        </button>
        {UNITS.filter(u => !u.external).map(u => (
          <button key={u.id} onClick={() => setUnitFilter(u.id)}
            className={`shrink-0 px-3 py-1 rounded-full text-xs font-medium border transition-all
              ${unitFilter === u.id ? 'bg-orange-500 text-white border-orange-500' : 'bg-white border-slate-200 text-slate-600'}`}>
            {u.label}
          </button>
        ))}
      </div>

      {/* KPIs */}
      <div className="grid grid-cols-3 gap-2 mb-5">
        {[
          { label: 'Relatórios', value: filtered.length },
          { label: 'Nota média', value: avgNota },
          { label: 'Erros qualidade', value: countAlert('temErroQualidade') },
        ].map(k => (
          <div key={k.label} className="bg-white rounded-xl border border-slate-200 p-3 text-center shadow-sm">
            <div className="text-2xl font-bold text-orange-500">{k.value}</div>
            <div className="text-xs text-slate-500 mt-0.5">{k.label}</div>
          </div>
        ))}
      </div>

      {/* Alerts summary */}
      <div className="bg-white rounded-xl border border-slate-200 p-4 mb-4 shadow-sm">
        <p className="text-xs font-bold text-slate-500 uppercase mb-3">Alertas do período</p>
        {[
          { key: 'temErroQualidade',       label: 'Erro de qualidade' },
          { key: 'temReclamacaoAtendimento',label: 'Reclamação atendimento' },
          { key: 'deliveryAtraso',          label: 'Atraso delivery' },
          { key: 'equipamentoQuebrado',     label: 'Equipamento quebrado' },
          { key: 'problemaSistema',         label: 'Problema sistema' },
          { key: 'rupturaOp',              label: 'Ruptura produto' },
        ].map(a => (
          <div key={a.key} className="flex justify-between items-center py-1.5 border-b border-slate-100 last:border-0">
            <span className="text-sm text-slate-700">{a.label}</span>
            <span className={`text-sm font-bold ${countAlert(a.key) > 0 ? 'text-red-500' : 'text-green-500'}`}>
              {countAlert(a.key)}
            </span>
          </div>
        ))}
      </div>

      {/* Bar chart by unit */}
      {byUnit.some(u => u.count > 0) && (
        <div className="bg-white rounded-xl border border-slate-200 p-4 mb-4 shadow-sm">
          <p className="text-xs font-bold text-slate-500 uppercase mb-3">Relatórios por unidade</p>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={byUnit} margin={{ top: 0, right: 0, left: -20, bottom: 0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" />
              <XAxis dataKey="name" tick={{ fontSize: 10 }} />
              <YAxis tick={{ fontSize: 10 }} />
              <Tooltip />
              <Bar dataKey="count" name="Relatórios" fill="#f97316" radius={[4,4,0,0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      )}

      {/* Nota avg by unit */}
      {byUnit.some(u => u.avgNota > 0) && (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <p className="text-xs font-bold text-slate-500 uppercase mb-3">Nota média por unidade</p>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={byUnit} margin={{ top: 0, right: 0, left: -20, bottom: 0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" />
              <XAxis dataKey="name" tick={{ fontSize: 10 }} />
              <YAxis domain={[0, 10]} tick={{ fontSize: 10 }} />
              <Tooltip />
              <Bar dataKey="avgNota" name="Nota média" fill="#22c55e" radius={[4,4,0,0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      )}

      {filtered.length === 0 && (
        <p className="text-sm text-slate-400 text-center mt-10">Nenhum relatório encontrado.</p>
      )}
    </div>
  );
};

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [user,           setUser]           = React.useState(null);
  const [reports,        setReports]        = React.useState([]);
  const [loading,        setLoading]        = React.useState(true);
  const [selectedUnit,   setSelectedUnit]   = React.useState(null); // {id, label, color}
  const [activeTab,      setActiveTab]      = React.useState('form');
  const [formData,       setFormData]       = React.useState(EMPTY);
  const [step,           setStep]           = React.useState(1);
  const [submitted,      setSubmitted]      = React.useState(false);
  const [isSubmitting,   setIsSubmitting]   = React.useState(false);
  const [toast,          setToast]          = React.useState('');
  const [viewReport,     setViewReport]     = React.useState(null);

  // Auth
  React.useEffect(() => {
    auth.signInAnonymously().catch(console.error);
    return auth.onAuthStateChanged(u => setUser(u));
  }, []);

  // Firestore
  React.useEffect(() => {
    if (!user) return;
    return db.collection(COLLECTION)
      .onSnapshot(snap => {
        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        data.sort((a, b) => b.timestamp - a.timestamp);
        setReports(data);
        setLoading(false);
      }, err => { console.error(err); setLoading(false); });
  }, [user]);

  // Toast timer
  React.useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(''), 3000);
    return () => clearTimeout(t);
  }, [toast]);

  const set = (field, val) => setFormData(p => ({ ...p, [field]: val }));

  const handleUnitSelect = (unit) => {
    if (unit.external) { window.open(unit.url, '_blank'); return; }
    setSelectedUnit(unit);
    setFormData({ ...EMPTY, unit: unit.id });
    setStep(1);
    setSubmitted(false);
    setActiveTab('form');
  };

  const handleNext = () => {
    if (!isStepValid(step, formData)) {
      setToast('Preencha todos os campos obrigatórios');
      return;
    }
    setStep(s => Math.min(s + 1, TOTAL_STEPS));
    window.scrollTo(0, 0);
  };

  const handleBack = () => {
    setStep(s => Math.max(s - 1, 1));
    window.scrollTo(0, 0);
  };

  const handleSubmit = async () => {
    if (!isStepValid(step, formData) || !user) return;
    setIsSubmitting(true);
    try {
      await db.collection(COLLECTION).add({
        ...formData, timestamp: Date.now(), userId: user.uid
      });
      setSubmitted(true);
    } catch(e) {
      console.error(e);
      setToast('Erro ao salvar. Tente novamente.');
    } finally { setIsSubmitting(false); }
  };

  const handleNewReport = () => {
    setFormData({ ...EMPTY, unit: selectedUnit?.id || '' });
    setStep(1);
    setSubmitted(false);
  };

  // ── Unit selector screen ────────────────────────────────────────────────────
  if (!selectedUnit) {
    return (
      <div className="min-h-screen bg-slate-50 px-4 pt-12 pb-8">
        <Toast msg={toast} />
        <div className="max-w-sm mx-auto">
          <div className="text-center mb-8">
            <div className="text-3xl mb-2">🍕</div>
            <h1 className="text-2xl font-bold text-slate-800">Relatório Operacional</h1>
            <p className="text-sm text-slate-500 mt-1">Selecione a unidade para iniciar</p>
          </div>
          <div className="space-y-3">
            {UNITS.map(unit => (
              <button key={unit.id} onClick={() => handleUnitSelect(unit)}
                className="w-full flex items-center gap-4 bg-white border border-slate-200 rounded-2xl p-4 hover:border-orange-300 hover:shadow-md transition-all text-left">
                <div className={`w-12 h-12 rounded-xl ${unit.color} flex items-center justify-center text-white font-bold text-lg`}>
                  {unit.label[0]}
                </div>
                <div>
                  <div className="font-semibold text-slate-800">{unit.label}</div>
                  {unit.external && <div className="text-xs text-slate-400">Abre em nova aba</div>}
                </div>
                <div className="ml-auto text-slate-300 text-lg">›</div>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── Success screen ──────────────────────────────────────────────────────────
  if (submitted) {
    return (
      <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center px-6 text-center">
        <div className="text-5xl mb-4">✅</div>
        <h2 className="text-xl font-bold text-slate-800">Relatório enviado!</h2>
        <p className="text-sm text-slate-500 mt-1 mb-6">{selectedUnit.label} · {fmtDate(formData.date)} · {formData.shift}</p>
        <button onClick={handleNewReport}
          className="w-full max-w-xs bg-orange-500 text-white py-3 rounded-xl font-semibold mb-3">
          Novo relatório
        </button>
        <button onClick={() => { setSelectedUnit(null); }}
          className="w-full max-w-xs bg-white text-slate-600 border border-slate-200 py-3 rounded-xl font-semibold">
          Trocar unidade
        </button>
      </div>
    );
  }

  // ── Main screen ─────────────────────────────────────────────────────────────
  const unitReports = reports.filter(r => r.unit === selectedUnit.id);

  return (
    <div className="min-h-screen bg-slate-50">
      <Toast msg={toast} />
      {viewReport && <ReportModal r={viewReport} onClose={() => setViewReport(null)} />}

      {/* Header */}
      <div className="bg-white border-b border-slate-200 px-4 py-3 flex items-center gap-3 sticky top-0 z-10">
        <button onClick={() => setSelectedUnit(null)}
          className="text-slate-400 hover:text-slate-700 text-lg font-bold pr-2">‹</button>
        <div className={`w-7 h-7 rounded-lg ${selectedUnit.color} flex items-center justify-center text-white text-xs font-bold`}>
          {selectedUnit.label[0]}
        </div>
        <span className="font-semibold text-slate-800 text-sm">{selectedUnit.label}</span>
      </div>

      {/* Tabs */}
      <div className="flex bg-white border-b border-slate-200">
        {[['form','📋 Formulário'], ['history','🕒 Histórico'], ['dashboard','📊 Dashboard']].map(([id, label]) => (
          <button key={id} onClick={() => setActiveTab(id)}
            className={`flex-1 py-2.5 text-xs font-medium transition-all
              ${activeTab === id ? 'text-orange-500 border-b-2 border-orange-500' : 'text-slate-500'}`}>
            {label}
          </button>
        ))}
      </div>

      {/* Form tab */}
      {activeTab === 'form' && (
        <div className="px-4 pt-4 pb-32">
          <ProgressBar step={step} />
          {step === 1 && <Step1 f={formData} set={set} unitLabel={selectedUnit.label} />}
          {step === 2 && <Step2 f={formData} set={set} />}
          {step === 3 && <Step3 f={formData} set={set} />}
          {step === 4 && <Step4 f={formData} set={set} />}
          {step === 5 && <Step5 f={formData} set={set} />}
          {step === 6 && <Step6 f={formData} set={set} />}

          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-4 py-3 flex gap-3">
            {step > 1 && (
              <button onClick={handleBack}
                className="flex-1 py-3 rounded-xl border border-slate-200 text-slate-600 font-semibold text-sm">
                Voltar
              </button>
            )}
            {step < TOTAL_STEPS ? (
              <button onClick={handleNext}
                className={`flex-1 py-3 rounded-xl font-semibold text-sm transition-all
                  ${isStepValid(step, formData)
                    ? 'bg-orange-500 text-white'
                    : 'bg-slate-200 text-slate-400'}`}>
                Próximo
              </button>
            ) : (
              <button onClick={handleSubmit} disabled={isSubmitting || !isStepValid(step, formData)}
                className={`flex-1 py-3 rounded-xl font-semibold text-sm transition-all
                  ${!isSubmitting && isStepValid(step, formData)
                    ? 'bg-green-500 text-white'
                    : 'bg-slate-200 text-slate-400'}`}>
                {isSubmitting ? '⏳ Enviando...' : 'Enviar relatório'}
              </button>
            )}
          </div>
        </div>
      )}

      {/* History tab */}
      {activeTab === 'history' && (
        <div className="px-4 pt-4 pb-8">
          {loading ? (
            <p className="text-sm text-slate-400 text-center mt-10">Carregando...</p>
          ) : unitReports.length === 0 ? (
            <p className="text-sm text-slate-400 text-center mt-10">Nenhum relatório ainda.</p>
          ) : (
            <div className="space-y-3">
              {unitReports.map(r => (
                <ReportCard key={r.id} r={r} onClick={() => setViewReport(r)} />
              ))}
            </div>
          )}
        </div>
      )}

      {/* Dashboard tab */}
      {activeTab === 'dashboard' && (
        <Dashboard reports={reports} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
